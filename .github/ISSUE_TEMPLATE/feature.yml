name: Feature request
description: Propose a new capability or an improvement to an existing one.
title: "[feature]: "
labels: ["feature", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? Who has it?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: A sketch of what you'd like to see. Implementation details are welcome but not required.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What did you reject and why? Helps avoid re-litigating later.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - UI / UX
        - Chat / providers
        - Voice / audio
        - Storage / search
        - Performance
        - Build / release / CI
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
