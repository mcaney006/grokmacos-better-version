name: Audit

on:
  push:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"
      - ".github/workflows/audit.yml"
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"
  schedule:
    # 13:00 UTC every day. Catches advisories that landed since the last push.
    - cron: "0 13 * * *"
  workflow_dispatch:

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  cargo-deny:
    name: cargo-deny (advisories + licenses + bans + sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans sources licenses
          arguments: --all-features

  cargo-audit:
    name: cargo-audit (RustSec advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: audit
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Run audit
        # `--ignore` mirrors the advisories list in deny.toml. Keep in sync.
        run: |
          cargo audit \
            --deny warnings \
            --ignore RUSTSEC-2024-0384 \
            --ignore RUSTSEC-2024-0320 \
            --ignore RUSTSEC-2026-0002 \
            --ignore RUSTSEC-2025-0141 \
            --ignore RUSTSEC-2025-0119 \
            --ignore RUSTSEC-2024-0436
