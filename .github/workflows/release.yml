name: Release

# Tag-driven release pipeline. Per artifact:
#   1. Checkout + pinned rustc + cargo cache.
#   2. (Linux only) install ALSA/X11/Wayland dev libs via xtask install-deps.
#   3. (macOS only) import Apple Developer ID cert into ephemeral keychain.
#   4. Compute SOURCE_DATE_EPOCH into $GITHUB_ENV via xtask.
#   5. Build + (macOS) sign + notarize + DMG via xtask.
#   6. Generate CycloneDX SBOM via xtask.
#   7. Package per-platform archive (tarball / zip) via xtask.
#   8. cosign keyless-sign every artifact via xtask.
#   9. SLSA build-provenance attestation via actions/attest-build-provenance.
#  10. softprops/action-gh-release publishes the GitHub Release.
#
# Every step body that calls into project code is `cargo xtask ci --stage X`
# or `cargo xtask <verb>`. The only `run:` blocks left contain code that
# genuinely belongs in a GitHub Actions runner: the Apple keychain
# bootstrap (calls `security`) and that's it. Sigstore signing + SLSA
# provenance use the official third-party actions because those need
# GitHub OIDC + the Sigstore Fulcio/Rekor protocol which we don't want
# to reimplement.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0). Leave blank for ad-hoc draft."
        required: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions: read-all

jobs:
  build:
    name: build ${{ matrix.label }}
    permissions:
      contents: read
      id-token: write       # OIDC token for Sigstore keyless signing
      attestations: write   # actions/attest-build-provenance writes here
    environment:
      name: release
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-14 = arm64; macos-15-intel = the supported x86_64 runner
          # (macos-13 was retired in late 2025 / early 2026).
          - { os: macos-14,        label: "macOS (arm64)",   triple: "aarch64-apple-darwin",     artifact: "dmg"    }
          - { os: macos-15-intel,  label: "macOS (x86_64)",  triple: "x86_64-apple-darwin",      artifact: "dmg"    }
          - { os: ubuntu-latest,  label: "Linux (x86_64)",  triple: "x86_64-unknown-linux-gnu", artifact: "tar.gz" }
          - { os: windows-latest, label: "Windows (x86_64)",triple: "x86_64-pc-windows-msvc",   artifact: "zip"    }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: "1.94.0"
          targets: ${{ matrix.triple }}
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae  # v2
        with:
          shared-key: release-${{ runner.os }}-${{ runner.arch }}
          cache-on-failure: false

      - name: install-deps
        if: matrix.os == 'ubuntu-latest'
        run: cargo xtask ci --stage install-deps

      # The Apple keychain bootstrap stays as shell — it's a tight sequence
      # of `security` CLI calls that genuinely belong on the runner. No
      # Rust orchestration value to be had by re-wrapping it.
      - name: Set up macOS keychain
        if: startsWith(matrix.os, 'macos') && env.APPLE_CERTIFICATE_P12_BASE64 != ''
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD:   ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD:            ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" \
              -P "$APPLE_CERTIFICATE_PASSWORD" \
              -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Append our temp keychain to the user's keychain search list
          # without dropping the existing entries. Read line-by-line into an
          # array (bash 3.2 compatible — macOS runners ship the old bash) so
          # we can pass each keychain as its own argument: no word-splitting
          # surprises, no unquoted $(...) (shellcheck SC2046/SC2086).
          existing_keychains=()
          while IFS= read -r kc; do
              existing_keychains+=("$kc")
          done < <(security list-keychains -d user | sed 's/"//g')
          security list-keychains -d user -s "$KEYCHAIN_PATH" "${existing_keychains[@]}"

          rm "$RUNNER_TEMP/cert.p12"

      - name: compute-source-date-epoch
        run: cargo xtask ci --stage compute-source-date-epoch

      - name: build
        if: ${{ !startsWith(matrix.os, 'macos') }}
        run: cargo xtask ci --stage build

      - name: build + sign + notarize + DMG (macOS)
        if: startsWith(matrix.os, 'macos')
        env:
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          APPLE_ID:                       ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID:                  ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD:    ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: cargo xtask dmg

      - name: sbom
        run: cargo xtask ci --stage sbom

      - name: package-tarball
        if: matrix.os == 'ubuntu-latest'
        run: cargo xtask ci --stage package-tarball

      - name: package-zip
        if: matrix.os == 'windows-latest'
        run: cargo xtask ci --stage package-zip

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: sign-artifacts
        run: cargo xtask ci --stage sign-artifacts

      # Explicit pre-upload guard. With `if-no-files-found: warn` the
      # upload action silently produces an empty artifact set when the
      # build stage broke without crashing the job. Catch this BEFORE
      # the release job downloads a void and publishes an empty
      # GitHub Release.
      #
      # The check is per-matrix-row: each row must produce the artifact
      # type its `matrix.artifact` claims, plus an SBOM. SHA256SUMS is
      # also required (dist produces it). Missing any of these = fail
      # the job; this is a release, not a smoke test.
      - name: Verify expected artifacts exist
        shell: bash
        run: |
          set -euo pipefail
          triple="${{ matrix.triple }}"
          missing=()

          case "${{ matrix.artifact }}" in
            tar.gz)
              ls dist/*.tar.gz                          || missing+=("dist/*.tar.gz")
              ;;
            zip)
              ls dist/*.zip                             || missing+=("dist/*.zip")
              ;;
            dmg)
              ls dist/"$triple"/*.dmg                   || missing+=("dist/$triple/*.dmg")
              ;;
          esac

          ls dist/"$triple"/*.sbom.json                 || missing+=("dist/$triple/*.sbom.json")
          ls dist/"$triple"/SHA256SUMS                  || missing+=("dist/$triple/SHA256SUMS")

          if [ "${#missing[@]}" -ne 0 ]; then
            echo "Release artifact verification FAILED. Missing:" >&2
            for f in "${missing[@]}"; do
              echo "  - $f" >&2
            done
            exit 1
          fi

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: grok-insane-${{ matrix.triple }}
          # Tarballs/zips land at dist/ (parent of triple); DMG, SBOM,
          # signatures, hashes stay under dist/<triple>/.
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/${{ matrix.triple }}/*.dmg
            dist/${{ matrix.triple }}/*.sbom.json
            dist/${{ matrix.triple }}/*.cosign-bundle
            dist/${{ matrix.triple }}/SHA256SUMS
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -laR artifacts/

      # Sanity-check the downloaded artifact set BEFORE attesting +
      # publishing. The build job's per-row verifier catches missing
      # outputs within a row; this catches the cross-row case where one
      # matrix entry was skipped or its upload silently emptied. We
      # need at least one of each shippable format AND a sigstore
      # bundle next to each one — a "release" without signatures
      # defeats the entire supply-chain story.
      - name: Verify download set is publishable
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          dmg=( artifacts/**/*.dmg )
          tar=( artifacts/**/*.tar.gz )
          zip=( artifacts/**/*.zip )
          sbom=( artifacts/**/*.sbom.json )
          sums=( artifacts/**/SHA256SUMS )

          # Every shippable artifact MUST have a cosign bundle next to it.
          missing_sig=()
          for art in "${dmg[@]}" "${tar[@]}" "${zip[@]}"; do
            if [ ! -e "${art}.cosign-bundle" ] && [ ! -e "$(dirname "$art")/$(basename "$art").cosign-bundle" ]; then
              # cosign sign-blob writes `<name>.<ext>.cosign-bundle`; also try
              # `<name>.cosign-bundle` for older naming.
              alt="${art%.*}.cosign-bundle"
              if [ ! -e "$alt" ]; then
                missing_sig+=("$art")
              fi
            fi
          done

          # At least one of each expected platform format must exist.
          fail=0
          if [ "${#dmg[@]}"  -eq 0 ]; then echo "ERROR: no .dmg artifacts"  >&2; fail=1; fi
          if [ "${#tar[@]}"  -eq 0 ]; then echo "ERROR: no .tar.gz artifacts" >&2; fail=1; fi
          if [ "${#zip[@]}"  -eq 0 ]; then echo "ERROR: no .zip artifacts"  >&2; fail=1; fi
          if [ "${#sbom[@]}" -eq 0 ]; then echo "ERROR: no SBOM artifacts"  >&2; fail=1; fi
          if [ "${#sums[@]}" -eq 0 ]; then echo "ERROR: no SHA256SUMS"      >&2; fail=1; fi
          if [ "${#missing_sig[@]}" -gt 0 ]; then
            echo "ERROR: missing cosign signature for:" >&2
            for f in "${missing_sig[@]}"; do echo "  - $f" >&2; done
            fail=1
          fi
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi

      - name: Generate SLSA provenance attestation
        uses: actions/attest-build-provenance@b3e506e8c389afc651c5bacf2b8f2a1ea0557215  # v4
        with:
          subject-path: |
            artifacts/**/*.dmg
            artifacts/**/*.tar.gz
            artifacts/**/*.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          name: GrokInsane ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          body: |
            ### Verifying this release

            Every artifact below is signed via Sigstore (keyless OIDC), has a
            CycloneDX SBOM, and a SHA256SUMS file. To verify:

            ```bash
            # signature + transparency log
            cosign verify-blob \
                --bundle <artifact>.cosign-bundle \
                --certificate-identity-regexp 'https://github.com/${{ github.repository }}/.github/workflows/release\.yml@.*' \
                --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
                <artifact>

            # SLSA build provenance
            gh attestation verify <artifact> --owner ${{ github.repository_owner }}

            # File integrity
            sha256sum -c SHA256SUMS
            ```
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.sbom.json
            artifacts/**/*.cosign-bundle
            artifacts/**/SHA256SUMS
