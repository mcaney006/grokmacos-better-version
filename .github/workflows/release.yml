name: Release

# Cuts a GitHub Release with signed + notarized macOS DMG (and platform
# binaries for Linux + Windows) when you push a tag like `v0.1.0`.
#
# Pipeline per artifact:
#   1. SHA-pinned actions check out + install rustc from rust-toolchain.toml
#   2. Release build (macOS path: sign + notarize + DMG via xtask)
#   3. CycloneDX SBOM generated for the workspace and bundled with the artifact
#   4. cosign sign-blob produces a keyless Sigstore signature + transparency
#      log entry (Rekor) for every uploaded file
#   5. softprops/action-gh-release attaches everything to a GitHub Release
#
# Apple secrets (see README "Releases" section for the full list).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0). Leave blank for ad-hoc draft."
        required: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Workflow-wide floor is read-only. Each job below opts in to the precise
# extra scopes it needs (id-token + attestations for signing, contents:write
# for the final Release publish). Belt and braces against accidental
# privilege inheritance.
permissions: read-all

jobs:
  build:
    name: build ${{ matrix.label }}
    permissions:
      contents: read
      id-token: write       # OIDC token for Sigstore keyless signing
      attestations: write   # actions/attest-build-provenance writes here
    # The `release` environment gates this job behind whatever review you
    # configure on the GitHub side (required reviewers, wait timer, allowed
    # branches/tags). Release signing should not happen because a workflow
    # sneezed; it should happen because a maintainer approved it.
    environment:
      name: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,       label: "macOS (arm64)",   triple: "aarch64-apple-darwin",     artifact: "dmg"    }
          - { os: macos-13,       label: "macOS (x86_64)",  triple: "x86_64-apple-darwin",      artifact: "dmg"    }
          - { os: ubuntu-latest,  label: "Linux (x86_64)",  triple: "x86_64-unknown-linux-gnu", artifact: "tar.gz" }
          - { os: windows-latest, label: "Windows (x86_64)",triple: "x86_64-pc-windows-msvc",   artifact: "zip"    }
    runs-on: ${{ matrix.os }}
    steps:
      # All actions are pinned by commit SHA. See the comment in ci.yml.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: "1.94.0"
          targets: ${{ matrix.triple }}

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae  # v2
        with:
          shared-key: release-${{ runner.os }}-${{ runner.arch }}
          cache-on-failure: false

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: cargo xtask install-deps

      # Pin SOURCE_DATE_EPOCH to the commit's authored timestamp. Build
      # toolchains and packaging steps that honour this variable will embed
      # the commit time instead of "now", so two CI runs of the same tag
      # produce identical artifacts (modulo unavoidable platform differences
      # like the macOS code-signature blob). This is the "reproducibility
      # proof" half of the reproducible-builds story; the other half is the
      # rust-toolchain.toml + Cargo.lock + --locked combo.
      - name: Compute SOURCE_DATE_EPOCH
        shell: bash
        run: |
          set -euo pipefail
          SDE="$(git log -1 --pretty=%ct)"
          echo "SOURCE_DATE_EPOCH=$SDE" >> "$GITHUB_ENV"
          echo "SOURCE_DATE_EPOCH set to $SDE ($(date -u -d @$SDE 2>/dev/null || true))"

      # --- macOS: import codesigning cert into an ephemeral keychain --------
      - name: Set up macOS keychain
        if: startsWith(matrix.os, 'macos') && env.APPLE_CERTIFICATE_P12_BASE64 != ''
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD:   ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD:            ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" \
              -P "$APPLE_CERTIFICATE_PASSWORD" \
              -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed s/\"//g)
          rm "$RUNNER_TEMP/cert.p12"

      # --- Build ------------------------------------------------------------
      - name: Release build (non-macOS)
        if: ${{ !startsWith(matrix.os, 'macos') }}
        # `--locked` enforces Cargo.lock; combined with rust-toolchain.toml
        # that's the deterministic-build contract.
        run: cargo build --release --target ${{ matrix.triple }} --locked

      - name: Build + sign + notarize + DMG (macOS)
        if: startsWith(matrix.os, 'macos')
        env:
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          APPLE_ID:                       ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID:                  ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD:    ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: cargo xtask dmg

      # --- SBOM (CycloneDX 1.5 JSON) ----------------------------------------
      # cargo-cyclonedx walks the dep graph and emits a deterministic JSON
      # manifest that any SBOM consumer (dependency-track, Grype, Trivy) can
      # ingest. Generated per-target so consumers see the actual deps used
      # for *this* binary, not the union of all platforms.
      - name: Install cargo-cyclonedx
        run: cargo install --locked cargo-cyclonedx

      - name: Generate SBOM
        shell: bash
        run: |
          set -euo pipefail
          OUT="dist/${{ matrix.triple }}"
          mkdir -p "$OUT"
          # The "all" format covers both JSON and XML so downstream tooling
          # has a choice.
          cargo cyclonedx \
              --format json \
              --target ${{ matrix.triple }} \
              --override-filename "grok-insane-sbom"
          # cargo-cyclonedx writes to the package root; move to the artifact dir.
          mv grok-insane-sbom.cdx.json "$OUT/grok-insane-${{ github.ref_name }}-${{ matrix.triple }}.sbom.json" || true
          ls -la "$OUT/"

      # --- Stage final artifact names --------------------------------------
      - name: Stage Linux tarball
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -euo pipefail
          OUT="dist/${{ matrix.triple }}"
          mkdir -p "$OUT"
          cp "target/${{ matrix.triple }}/release/grok-insane" "$OUT/grok-insane"
          cp README.md "$OUT/" || true
          tar -C dist -czf "$OUT/grok-insane-${GITHUB_REF_NAME:-dev}-${{ matrix.triple }}.tar.gz" \
              "${{ matrix.triple }}"
          ls -la "$OUT/"

      - name: Stage Windows zip
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $out = "dist\${{ matrix.triple }}"
          New-Item -ItemType Directory -Path $out -Force | Out-Null
          Copy-Item "target\${{ matrix.triple }}\release\grok-insane.exe" "$out\grok-insane.exe"
          Compress-Archive -Path "$out\grok-insane.exe" `
                           -DestinationPath "$out\grok-insane-${{ github.ref_name }}-${{ matrix.triple }}.zip" `
                           -Force

      # --- Sigstore keyless signing ----------------------------------------
      # Every release artifact (.dmg, .tar.gz, .zip, .sbom.json) gets a
      # detached cosign signature with a Rekor transparency-log entry. No
      # GPG keys to rotate; the signing identity is this workflow's OIDC
      # token, recorded publicly in the Fulcio/Rekor logs.
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: cosign sign release artifacts
        shell: bash
        run: |
          set -euo pipefail
          OUT="dist/${{ matrix.triple }}"
          shopt -s nullglob
          for f in "$OUT"/*.dmg "$OUT"/*.tar.gz "$OUT"/*.zip "$OUT"/*.sbom.json; do
            [ -e "$f" ] || continue
            echo "::group::cosign sign $f"
            cosign sign-blob --yes \
                --bundle "$f.cosign-bundle" \
                "$f"
            echo "::endgroup::"
          done
          ls -la "$OUT/"

      # --- Upload per-OS artifact ------------------------------------------
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: grok-insane-${{ matrix.triple }}
          path: |
            dist/${{ matrix.triple }}/*.dmg
            dist/${{ matrix.triple }}/*.tar.gz
            dist/${{ matrix.triple }}/*.zip
            dist/${{ matrix.triple }}/*.sbom.json
            dist/${{ matrix.triple }}/*.cosign-bundle
          if-no-files-found: warn

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -laR artifacts/

      # Build provenance attestation (SLSA Level 3) — proves these artifacts
      # were produced by *this* workflow run, signed via the same Sigstore
      # transparency log used for the artifact signatures.
      - name: Generate SLSA provenance attestation
        uses: actions/attest-build-provenance@b3e506e8c389afc651c5bacf2b8f2a1ea0557215  # v4
        with:
          subject-path: |
            artifacts/**/*.dmg
            artifacts/**/*.tar.gz
            artifacts/**/*.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          name: GrokInsane ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          body: |
            ### Verifying this release

            Every artifact below is signed via Sigstore (keyless OIDC) and
            has a CycloneDX SBOM. To verify:

            ```bash
            cosign verify-blob \
                --bundle <artifact>.cosign-bundle \
                --certificate-identity-regexp 'https://github.com/${{ github.repository }}/.github/workflows/release\.yml@.*' \
                --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
                <artifact>
            ```

            The SLSA provenance attestation can be inspected with
            `gh attestation verify <artifact> --owner ${{ github.repository_owner }}`.
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.sbom.json
            artifacts/**/*.cosign-bundle
