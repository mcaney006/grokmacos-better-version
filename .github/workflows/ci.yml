name: CI

# Every step body in this file is `cargo xtask ci --stage <name>`. The Rust
# orchestrator at `xtask/src/main.rs` (search for `fn run_stage`) owns the
# behaviour: GHA `::group::` markers, $GITHUB_STEP_SUMMARY rows, telemetry,
# error propagation. This YAML is a thin scheduler over a Rust state
# machine — not the other way around.

on:
  push:
    branches: [main, master]
  pull_request:
  # Merge queue (when enabled in repo settings) runs CI against the
  # synthetic merge commit, not the PR tip, so main stays green after
  # integration.
  merge_group:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Workflow-wide token floor: contents:read only. `read-all` was wider
# than necessary (granted read across packages, pull-requests, issues,
# etc.) and zizmor's excessive-permissions audit flagged it. CI only
# needs to read source.
permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.label }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  label: "linux (x86_64)" }
          - { os: macos-latest,   label: "macos (arm64)" }
          - { os: windows-latest, label: "windows (x86_64)" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          persist-credentials: false  # CI never pushes; drop stored GITHUB_TOKEN

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae  # v2
        with:
          shared-key: ci-${{ runner.os }}-${{ runner.arch }}
          cache-on-failure: false

      # cargo-nextest replaces `cargo test` with a process-per-test runner
      # that's ~3x faster on this graph and surfaces hung tests cleanly.
      # Installed from prebuilt binaries — no source compile, no nightly.
      - name: install cargo-nextest
        uses: taiki-e/install-action@4dc6d6f7daccba8c25b95878f1d5cf1c1ca77ca5  # v2
        with:
          tool: nextest

      # --- All step bodies below are the same: `cargo xtask ci --stage X`.
      # The xtask binary handles the GHA-specific output, the step summary,
      # and the telemetry. YAML stays declarative.

      - name: install-deps
        if: matrix.os == 'ubuntu-latest'
        run: cargo xtask ci --stage install-deps

      - name: fmt
        run: cargo xtask ci --stage fmt

      - name: clippy
        run: cargo xtask ci --stage clippy

      - name: nextest
        run: cargo xtask ci --stage nextest

      - name: build
        run: cargo xtask ci --stage build

      - name: Upload binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: grok-insane-${{ matrix.os }}
          path: dist/
          if-no-files-found: ignore

      - name: Upload xtask telemetry
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: xtask-metrics-${{ matrix.os }}
          path: dist/xtask-metrics.jsonl
          if-no-files-found: ignore

  # Feature matrix: prove the code still builds + tests cleanly across
  # every meaningful feature configuration. Without this, optional
  # features rot silently between commits because the default CI path
  # never exercises them.
  #
  # `rag` and `all-features` pull `fastembed -> ort-sys`, which downloads
  # a pre-built ONNX Runtime tarball at build time. Real GitHub-hosted
  # runners have the network for this; sandboxed environments may not.
  features:
    name: features (${{ matrix.label }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - { features: "--no-default-features",  label: "no-default-features" }
          - { features: "--features hq-resample", label: "hq-resample" }
          - { features: "--features rag",         label: "rag" }
          - { features: "--features hotkeys",     label: "hotkeys" }
          - { features: "--all-features",         label: "all-features" }
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: "1.94.0"
          components: clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae  # v2
        with:
          shared-key: features-${{ matrix.label }}
      - name: install OS deps
        run: cargo xtask ci --stage install-deps
      # `matrix.features` is repo-controlled but spliced via env to keep
      # the script template-injection-clean. We DO want word-splitting on
      # the value ("--features hq-resample" -> two args), so read it into
      # a bash array via `read -a` instead of relying on unquoted
      # expansion (which shellcheck would, correctly, complain about).
      - name: clippy
        shell: bash
        env:
          CARGO_FEATURES: ${{ matrix.features }}
        run: |
          set -euo pipefail
          read -ra args <<<"$CARGO_FEATURES"
          cargo clippy --workspace --all-targets "${args[@]}" -- -D warnings
      - name: test
        shell: bash
        env:
          CARGO_FEATURES: ${{ matrix.features }}
        run: |
          set -euo pipefail
          read -ra args <<<"$CARGO_FEATURES"
          cargo test --workspace "${args[@]}" --locked

  # Doc build catches broken intra-doc links, malformed doctests, and
  # crate-graph misconfiguration. Cheap + high-signal. `RUSTDOCFLAGS=-D
  # warnings` turns every rustdoc lint into a hard failure.
  doc:
    name: doc (no broken links)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: "1.94.0"
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae  # v2
        with:
          shared-key: doc
      - name: install OS deps
        run: cargo xtask ci --stage install-deps
      - name: doc
        run: cargo doc --workspace --no-deps --document-private-items
