name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel in-flight runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  # Force JS actions onto the Node.js 24 runtime ahead of the June 2, 2026
  # default flip. Pinned actions/* below are already Node-24 capable; this is
  # belt-and-braces against any transitive JS action picking up Node 20.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  label: "linux (x86_64)" }
          - { os: macos-latest,   label: "macos (arm64)" }
          - { os: windows-latest, label: "windows (x86_64)" }
    runs-on: ${{ matrix.os }}
    steps:
      # All actions are pinned by commit SHA, not floating tags. Dependabot
      # (see .github/dependabot.yml) updates them with the version comment so
      # provenance stays auditable. Replacing a release tag is a known
      # supply-chain attack vector (tj-actions/changed-files, March 2025).
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Install Rust
        # Toolchain version is pinned to match rust-toolchain.toml exactly,
        # so the runners can't accidentally float onto a newer stable that
        # introduces new clippy lints under our `-D warnings` policy.
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy

      # Rust-specific caching. Replaces actions/cache@v4 which targets Node
      # 20 and emits a deprecation warning when force-flipped to Node 24.
      # Swatinem/rust-cache@v2 understands `target/`, the cargo registry, and
      # git checkout caches as one unit and is Node 24 native.
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae  # v2
        with:
          shared-key: ci-${{ runner.os }}-${{ runner.arch }}
          # Don't poison the cache if any step fails.
          cache-on-failure: false

      - name: Toolchain info
        run: |
          rustc --version --verbose
          cargo --version --verbose
          cargo fmt --version
          cargo clippy --version

      - name: Install OS dev deps (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: cargo xtask install-deps

      - name: Fmt check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --workspace -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Release build
        run: cargo xtask dist

      - name: Upload binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: grok-insane-${{ matrix.os }}
          path: dist/
          if-no-files-found: ignore
