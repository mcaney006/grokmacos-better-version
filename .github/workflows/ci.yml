name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel in-flight runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  # Force JS actions onto the Node.js 24 runtime ahead of the June 2, 2026
  # default flip. Pinned actions/* below are already Node-24 capable; this is
  # belt-and-braces against any transitive JS action picking up Node 20.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  label: "linux (x86_64)" }
          - { os: macos-latest,   label: "macos (arm64)" }
          - { os: windows-latest, label: "windows (x86_64)" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      # Rust-specific caching. Replaces actions/cache@v4 which targets Node
      # 20 and emits a deprecation warning when force-flipped to Node 24.
      # Swatinem/rust-cache@v2 understands `target/`, the cargo registry, and
      # git checkout caches as one unit and is Node 24 native.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ runner.os }}-${{ runner.arch }}
          # Don't poison the cache if any step fails.
          cache-on-failure: false

      - name: Toolchain info
        run: |
          rustc --version --verbose
          cargo --version --verbose
          cargo fmt --version
          cargo clippy --version

      - name: Install OS dev deps (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: cargo xtask install-deps

      - name: Fmt check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --workspace -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Release build
        run: cargo xtask dist

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: grok-insane-${{ matrix.os }}
          path: dist/
          if-no-files-found: ignore
