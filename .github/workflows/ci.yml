name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel in-flight runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  label: "linux (x86_64)" }
          - { os: macos-latest,   label: "macos (arm64)" }
          - { os: windows-latest, label: "windows (x86_64)" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install OS dev deps (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: cargo xtask install-deps

      - name: Full check (fmt + clippy + test)
        run: cargo xtask check

      - name: Release build
        run: cargo xtask dist

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: grok-insane-${{ matrix.os }}
          path: dist/
          if-no-files-found: ignore
