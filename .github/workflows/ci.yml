name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  # `merge_group` lets GitHub's merge queue run CI on the synthetic merge
  # commit (PR + main combined) before actually landing the PR. That is the
  # difference between "this PR was green in isolation" and "main stays green
  # after this PR lands alongside whatever else just merged."
  merge_group:

# Cancel in-flight runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  # Force JS actions onto the Node.js 24 runtime ahead of the June 2, 2026
  # default flip. Pinned actions/* below are already Node-24 capable; this is
  # belt-and-braces against any transitive JS action picking up Node 20.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Workflow-wide token floor is read-only. Any job that needs more privilege
# (e.g. writing artifact attestations) must explicitly elevate. This is the
# GitHub-recommended "least privilege" posture for GITHUB_TOKEN.
permissions: read-all

jobs:
  build:
    name: ${{ matrix.label }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  label: "linux (x86_64)" }
          - { os: macos-latest,   label: "macos (arm64)" }
          - { os: windows-latest, label: "windows (x86_64)" }
    runs-on: ${{ matrix.os }}
    steps:
      # All actions are pinned by commit SHA, not floating tags. Dependabot
      # (see .github/dependabot.yml) updates them with the version comment so
      # provenance stays auditable. Replacing a release tag is a known
      # supply-chain attack vector (tj-actions/changed-files, March 2025).
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Install Rust
        # Toolchain version is pinned to match rust-toolchain.toml exactly,
        # so the runners can't accidentally float onto a newer stable that
        # introduces new clippy lints under our `-D warnings` policy.
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae  # v2
        with:
          shared-key: ci-${{ runner.os }}-${{ runner.arch }}
          cache-on-failure: false

      - name: Toolchain info
        run: |
          rustc --version --verbose
          cargo --version --verbose
          cargo fmt --version
          cargo clippy --version

      - name: Install OS dev deps (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: cargo xtask install-deps

      - name: Fmt check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --workspace -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Release build
        run: cargo xtask dist

      # Render a compact, copy-pasteable summary into the run page so
      # reviewers don't have to scroll through 9 000 lines of ANSI.
      - name: Job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## $(echo '${{ matrix.label }}')"
            echo ""
            echo "| Step | Result |"
            echo "| --- | --- |"
            echo "| Fmt check | ${{ steps.fmt-check.outcome || 'completed' }} |"
            echo "| Clippy | ${{ steps.clippy.outcome || 'completed' }} |"
            echo "| Test | ${{ steps.test.outcome || 'completed' }} |"
            echo "| Release build | ${{ steps.release-build.outcome || 'completed' }} |"
            echo ""
            echo "rustc: \`$(rustc --version | head -1)\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: grok-insane-${{ matrix.os }}
          path: dist/
          if-no-files-found: ignore
