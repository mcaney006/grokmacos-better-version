name: Lint workflows

# Static analysis of the workflow YAML itself.
#
# * `actionlint` parses every workflow file with a real Go-based grammar and
#   catches issues like undefined matrix keys, shellcheck warnings inside
#   `run:` blocks, references to nonexistent steps, etc.
# * `zizmor` is the modern security-focused workflow linter. It flags
#   script-injection sinks (e.g. `${{ github.event.pull_request.title }}` in
#   `run:`), unpinned actions, dangerous token scopes, artifact poisoning,
#   missing `permissions:` blocks — the GitHub Actions equivalent of CodeQL.

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/dependabot.yml"
      - ".github/actionlint.yaml"
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/dependabot.yml"
      - ".github/actionlint.yaml"
  schedule:
    # Weekly catch — new zizmor rules + new GHA features land regularly.
    - cron: "0 14 * * 1"
  workflow_dispatch:

concurrency:
  group: lint-actions-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8  # v2
        with:
          # Force the action to fail the job if any issue is reported.
          fail-on-error: "true"

  zizmor:
    name: zizmor (security audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          persist-credentials: false
      # `astral-sh/setup-uv` is great for Python projects but here it just
      # installs a tool. It also (1) targets Node 20, which trips the
      # Node 20 deprecation warning, and (2) attempts to build a cache key
      # from Python lockfiles that don't exist in this Rust repo. Use the
      # pre-installed pipx on the runner instead — zero JS, zero cache
      # mis-configuration.
      - name: Install zizmor
        run: pipx install zizmor
      # zizmor refuses `--pedantic` together with `--persona=…` (they're
      # mutually exclusive in the CLI). Run them as two gates so we get
      # both the practical auditor pass AND the full pedantic ruleset.
      # Either failing fails the job.
      - name: Run zizmor (auditor persona)
        run: zizmor --persona=auditor .github/workflows/
      - name: Run zizmor (pedantic)
        run: zizmor --pedantic .github/workflows/
