# cargo-deny configuration.
#
# Run `cargo deny check` locally or via `cargo xtask audit`. CI runs it on
# every push (see .github/workflows/audit.yml).

[graph]
# Skip dev/build dependency dupes; we only care about runtime supply chain.
all-features = false
no-default-features = false

[advisories]
# Database of CVEs published by the Rust security working group.
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# Advisories we have evaluated and accepted with rationale below.
ignore = [
    # `instant` is unmaintained but only used transitively by egui-winit's
    # animation timing on web targets. We build native only; the code path
    # is reachable but does no I/O and exposes no attack surface.
    "RUSTSEC-2024-0384",
    # `yaml-rust` is unmaintained but only used by `syntect` to load
    # bundled syntax-highlighting grammars at startup. We never feed it
    # untrusted YAML — input is the embedded grammar files compiled into
    # the binary.
    "RUSTSEC-2024-0320",
    # `lru` IterMut unsound (RUSTSEC-2026-0002). Comes via `tantivy`; the
    # affected iterator is not exposed across our API boundary. Will be
    # fixed by bumping tantivy when 0.26+ becomes compatible with our
    # other deps.
    "RUSTSEC-2026-0002",
    # `bincode` 1.x unmaintained — we've already migrated to 2.x. Some
    # build-only transitives still pull 1.x; harmless.
    "RUSTSEC-2025-0141",
    # `number_prefix` unmaintained — used only transitively by indicatif
    # for human-readable byte counts in download progress bars (fastembed
    # only, behind the `rag` feature). No security surface.
    "RUSTSEC-2025-0119",
    # `paste` unmaintained — used at compile time only by various proc-
    # macros (tantivy, eframe). Build-time, no runtime exposure.
    "RUSTSEC-2024-0436",
]

[licenses]
# Only let licenses we've reviewed into the dependency graph. Anything
# missing here means a new dep brought in an unfamiliar license and a human
# needs to look at it.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "0BSD",
    "BSL-1.0",
    # Bundled fonts shipped by `epaint_default_fonts`. SIL OFL 1.1 + Ubuntu
    # Font Licence v1.0 are font-specific permissive licences with the usual
    # "you can use the fonts freely, you can't sell them as fonts" terms.
    # Reviewed by hand on 2026-05-20.
    "OFL-1.1",
    "Ubuntu-font-1.0",
    # Community Data License Agreement – Permissive 2.0. Used by webpki-roots
    # and similar Mozilla-published certificate bundles. Permissive licence
    # explicitly compatible with redistribution.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.85
# Crates with explicitly approved license overrides go here.
[[licenses.exceptions]]
allow = ["Unicode-3.0"]
name = "unicode-ident"

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Crates we never want to see in the graph, with rationale.
deny = [
    # Old OpenSSL bindings — we use rustls everywhere.
    { name = "openssl-sys", reason = "rustls is the policy; bringing in OpenSSL is unsafe surface area" },
    { name = "native-tls", reason = "rustls is the policy" },
]
# Permit known multi-version duplicates that come from the egui ecosystem.
skip = [
    { name = "bitflags" },
    { name = "syn" },
    { name = "windows-sys" },
    { name = "windows-targets" },
    { name = "wasi" },
    { name = "rand" },
    { name = "rand_chacha" },
    { name = "rand_core" },
    { name = "getrandom" },
    { name = "hashbrown" },
    { name = "thiserror" },
    { name = "thiserror-impl" },
    { name = "regex-automata" },
    { name = "regex-syntax" },
]

[sources]
# Only crates.io. Reject git/path deps in the runtime graph.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
